<!doctype html>
<html lang="mk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register | Rybakina Career Tracker</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">
        Rybakina Career Tracker
      </a>

      <div class="ms-auto">
        <a class="btn btn-outline-success" href="login.html">Log in</a>
      </div>
    </div>
  </nav>

  <main class="py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">

          <div class="form-card">
            <h1 class="h3 mb-3">Sign in</h1>

            <p class="text-muted">
          Create a user profile so you can comment and follow your favorite matches.        
          </p>

            <form id="registerForm">
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="firstName" class="form-label">First name</label>
                  <input
                    type="text"
                    class="form-control"
                    id="firstName"
                    placeholder="First name"
                    required>
                </div>

                <div class="col-md-6 mb-3">
                  <label for="lastName" class="form-label">Last name</label>
                  <input
                    type="text"
                    class="form-control"
                    id="lastName"
                    placeholder="Last name"
                    required>
                </div>
              </div>

              <div class="mb-3">
                <label for="email" class="form-label">E-mail</label>
                <input
                  type="email"
                  class="form-control"
                  id="email"
                  placeholder="example@email.com"
                  required>
              </div>

              <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input
                  type="text"
                  class="form-control"
                  id="username"
                  placeholder="ana123"
                  required>
              </div>

              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input
                  type="password"
                  class="form-control"
                  id="password"
                  placeholder="At least 8 characters"
                  minlength="8"
                  required>
              </div>

              <div class="mb-3">
                <label for="role" class="form-label">User type</label>
                <select class="form-select" id="role">
                  <option selected>Registered user</option>
                  <option>Administrator</option>
                </select>
              </div>

              <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="terms" checked>
                <label class="form-check-label" for="terms">
                I agree to the terms of use.
                </label>
              </div>

              <button type="submit" class="btn btn-success w-100">
                Sign up
              </button>
            </form>

            <hr>

            <p class="small text-muted mb-0">
     Create a profile and save your favorite moments from Rybakina's career. 
           </p>
          </div>

        </div>
      </div>
    </div>
  </main>

 <footer class="bg-white border-top py-4"> 
  <div class="container text-center text-muted">
    <p class="mb-0">Rybakina Career Tracker - Register screen </p>
  </div>
  </footer>

  <script>
    document.getElementById("registerForm").addEventListener("submit", async (event) => {
      event.preventDefault();

      const payload = {
        firstName: document.getElementById("firstName").value,
        lastName: document.getElementById("lastName").value,
        email: document.getElementById("email").value,
        username: document.getElementById("username").value,
        password: document.getElementById("password").value,
        role: document.getElementById("role").value === "Administrator" ? "admin" : "user"
      };

      try {
        const response = await fetch("http://localhost:3000/api/auth/register", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || "Register failed");
        }

        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user));
        window.location.href = "matches.html";
      } catch (error) {
        alert(error.message);
      }
    });
  </script>
</body>
</html>
