<!doctype html>
<html lang="mk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Add match | Rybakina Career Tracker</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">
        Rybakina Career Tracker
      </a>

      <div class="ms-auto">
        <a class="btn btn-outline-success" href="matches.html">Back to list</a>
      </div>
    </div>
  </nav>

  <header class="page-header">
    <div class="container">
      <h1 class="h2">Add a new match</h1>
      <p class="text-muted mb-0">
Add a new significant match to your career archive.
      </p>
    </div>
  </header>

  <main class="py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-8">

          <div class="form-card">
            <form>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="tournament" class="form-label">Tournament</label>
                  <input
                    type="text"
                    class="form-control"
                    id="tournament"
                    value="Australian Open"
                    placeholder="Enter tournament name">
                </div>

                <div class="col-md-6 mb-3">
                  <label for="year" class="form-label">Year</label>
                  <input
                    type="number"
                    class="form-control"
                    id="year"
                    value="2026"
                    placeholder="2026">
                </div>
              </div>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="opponent" class="form-label">Opponent</label>
                  <input
                    type="text"
                    class="form-control"
                    id="opponent"
                    value="Aryna Sabalenka"
                    placeholder="Opponent name">
                </div>

                <div class="col-md-6 mb-3">
                  <label for="score" class="form-label">Result</label>
                  <input
                    type="text"
                    class="form-control"
                    id="score"
                    value="6-4, 4-6, 6-4"
                    placeholder="6-4, 4-6, 6-4">
                </div>
              </div>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="category" class="form-label">Category</label>
                  <select class="form-select" id="category">
                    <option selected>Grand Slam</option>
                    <option>WTA 1000</option>
                    <option>WTA 500</option>
                    <option>WTA 250</option>
                    <option>WTA Finals</option>
                  </select>
                </div>

                <div class="col-md-6 mb-3">
                  <label for="surface" class="form-label">Court</label>
                  <select class="form-select" id="surface">
                    <option selected>Hard</option>
                    <option>Grass</option>
                    <option>Clay</option>
                  </select>
                </div>
              </div>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="round" class="form-label">Phase</label>
                  <select class="form-select" id="round">
                    <option selected>Final</option>
                    <option>Semi-final</option>
                    <option>Quarter-final</option>
                    <option>Round of 16</option>
                    <option>Group stage</option>
                  </select>
                </div>

                <div class="col-md-6 mb-3">
                  <label for="result" class="form-label">Status</label>
                  <select class="form-select" id="result">
                    <option selected>Win</option>
                    <option>Defeat</option>
                  </select>
                </div>
              </div>

              <div class="mb-3">
                <label for="notes" class="form-label">Note</label>
                <textarea class="form-control" id="notes" rows="4">A brief description of the meaning of the match...</textarea>
              </div>

              <div class="d-flex gap-2 mt-4">
                <a href="matches.html" class="btn btn-success">Save</a>
                <a href="matches.html" class="btn btn-outline-secondary">Cancel</a>
              </div>

            </form>

            <hr>

          
          </div>

        </div>
      </div>
    </div>
  </main>

  <footer class="bg-white border-top py-4">
    <div class="container text-center text-muted">
      <p class="mb-0">Rybakina Career Tracker - Add match screen</p>
    </div>
  </footer>

</body>
</html>
