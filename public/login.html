<!doctype html>
<html lang="mk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | Rybakina Career Tracker</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">
        Rybakina Career Tracker
      </a>

      <div class="ms-auto">
        <a class="btn btn-outline-success" href="index.html">Home</a>
      </div>
    </div>
  </nav>

  <main class="py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-7 col-lg-5">

          <div class="form-card">
            <h1 class="h3 mb-3">Log in</h1>

            <p class="text-muted">
Log in to comment on matches and save your favorite results.            </p>

            <form>
              <div class="mb-3">
                <label for="email" class="form-label">E-mail</label>
                <input
                  type="email"
                  class="form-control"
                  id="email"
                  placeholder="example@email.com"
                  value="admin@rybakina.com">
              </div>

              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input
                  type="password"
                  class="form-control"
                  id="password"
                  placeholder="Enter password"
                  value="password123">
              </div>

              <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="remember" checked>
                  <label class="form-check-label" for="remember">
                    Remember me
                  </label>
                </div>

                <a href="register.html">Don't have an account?</a>
              </div>

              <a href="index.html" class="btn btn-success w-100">
                Log in
              </a>
            </form>

            <hr>

            <p class="small text-muted mb-0">
Log in to follow your favorite matches and participate in discussions. 
</p>          </div>

        </div>
      </div>
    </div>
  </main>

  <footer class="bg-white border-top py-4">
    <div class="container text-center text-muted">
      <p class="mb-0">Rybakina Career Tracker - Login screen</p>
    </div>
  </footer>

</body>
</html>
