services:
  web:
    build: .
    container_name: rybakina-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/rybakina_tracker
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: rybakina-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: